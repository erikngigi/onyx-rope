name: Flutter Build & Release Onyx Rope Application
on:
  push:
    branches: [main]
    paths:
      - 'app/lib/**'
      - 'app/android/**'
      - 'app/pubspec.yaml'
      - 'app/pubspec.lock'
      - '.github/workflows/build-onyx-rope.yml'
  workflow_dispatch:
    inputs:
      flutter_channel:
        description: 'Flutter channel to build with'
        required: true
        default: 'stable'
        type: choice
        options:
          - 'stable'
          - 'beta'
          - 'master'
      create_release:
        description: 'Create GitHub release'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
# ─── Environment variables ─────────────────────────────────────────────────────
env:
  JAVA_VERSION: ${{ vars.JAVA_VERSION || '17' }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION || 'temurin' }}
  FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION || '3.41.9' }}
  FLUTTER_CHANNEL: ${{ inputs.flutter_channel || vars.FLUTTER_CHANNEL || 'stable' }}
jobs:
  build-and-release:
    name: Build APK & Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    permissions:
      contents: write # Required to create tags and releases
    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4.2.2
      # ─── 2. Extract version from pubspec.yaml ──────────────────────────────
      - name: Extract version
        id: version
        run: |
          # Extracts e.g. "1.0.0+1" → VERSION=1.0.0 and VERSION_CODE=1
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION=$(echo $RAW | cut -d'+' -f1)
          VERSION_CODE=$(echo $RAW | cut -d'+' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION (code: $VERSION_CODE)"
      # ─── 3. Echo trigger information ───────────────────────────────────────
      - name: Echo trigger information
        run: |
          echo "============================================"
          echo "  Flutter Build & GitHub Release"
          echo "============================================"
          echo "Java version    : ${{ env.JAVA_VERSION }}"
          echo "Flutter version : ${{ env.FLUTTER_VERSION }}"
          echo "App version     : ${{ steps.version.outputs.VERSION }}"
          echo "Version code    : ${{ steps.version.outputs.VERSION_CODE }}"
          echo "Tag             : ${{ steps.version.outputs.TAG }}"
          echo "============================================"
      # ─── 4. Set up Java ────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4.7.1
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      # ─── 5. Set up Flutter ─────────────────────────────────────────────────
      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2.18.0
        id: flutter-action
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      # ─── 6. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get
      # ─── 7. Run tests ──────────────────────────────────────────────────────
      - name: Run tests
        run: flutter test
      # ─── 8. Decode keystore ────────────────────────────────────────────────
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/release-keystore.jks
      # ─── 9. Strip C++ build IDs (F-Droid compatibility) ───────────────────
      - name: Remove build IDs from JNI modules
        run: |
          sed -i -e 's/-Wl,/-Wl,--build-id=none,/' \
            ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}/hosted/pub.dev/jni-*/src/CMakeLists.txt || true
      # ─── 10. Build universal APK ───────────────────────────────────────────
      - name: Build universal APK
        env:
          CI: "true"
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_PATH: release-keystore.jks
        run: |
          flutter build apk --release --no-tree-shake-icons \
            --split-debug-info=build/symbols
          VERSION=${{ steps.version.outputs.VERSION }}
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/onyx-rope-v${VERSION}.apk
      # ─── 11. Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'push' || inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Onyx Rope ${{ steps.version.outputs.TAG }}"
          body: |
            ## Onyx Rope ${{ steps.version.outputs.TAG }}

            ### Install
            Download the APK and add it to your local F-Droid repository,
            then run `fdroid deploy` to publish.

            ### What's new
            See changelogs for details.
          draft: false
          prerelease: false
          make_latest: true
          files: |
            app/build/app/outputs/flutter-apk/onyx-rope-v${{ steps.version.outputs.VERSION }}.apk
      # ─── 12. Echo build result ─────────────────────────────────────────────
      - name: Echo build result
        run: |
          echo "============================================"
          echo "  Release Successful"
          echo "  Version : ${{ steps.version.outputs.TAG }}"
          echo "  Run #${{ github.run_number }}"
          echo "============================================"
