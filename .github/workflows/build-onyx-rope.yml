name: Flutter Build & Deploy Onyx Rope Application
on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-onyx-rope.yml'
  workflow_dispatch:
    inputs:
      flutter_channel:
        description: 'Flutter channel to build with'
        required: true
        default: 'stable'
        type: choice
        options:
          - 'stable'
          - 'beta'
          - 'master'
      publish_nightly:
        description: 'Publish build to VPS'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
# ─── Environment variables ─────────────────────────────────────────────────────
# Now sourcing from GitHub Repository Variables (Settings > Secrets and variables)
env:
  JAVA_VERSION: ${{ vars.JAVA_VERSION || '17' }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION || 'temurin' }}
  FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION || '3.41.9' }}
  FLUTTER_CHANNEL: ${{ inputs.flutter_channel || vars.FLUTTER_CHANNEL || 'stable' }}
  VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/var/www/downloads' }}
jobs:
  build-and-deploy:
    name: Build APK & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4.2.2
      # ─── 2. Echo trigger information ───────────────────────────────────────
      - name: Echo trigger information
        run: |
          echo "============================================"
          echo "  Flutter Build & VPS Deploy"
          echo "============================================"
          echo "Java version    : ${{ env.JAVA_VERSION }}"
          echo "Flutter version : ${{ env.FLUTTER_VERSION }}"
          echo "VPS host        : ${{ secrets.VPS_HOST }}"
          echo "Target Path     : ${{ env.VPS_DEPLOY_PATH }}"
          echo "============================================"
      # ─── 3. Set up Java ────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4.7.1
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      # ─── 4. Set up Flutter ─────────────────────────────────────────────────
      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      # ─── 5. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get
      # ─── 6. Run tests ──────────────────────────────────────────────────────
      - name: Run tests
        run: flutter test
      # ─── 7. Build debug APK ────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          export VERSION_CODE=$(date '+%s')
          sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" android/app/build.gradle.kts
          flutter build apk --debug
      # ─── 8. SCP APK to VPS ─────────────────────────────────────────────────
      - name: Copy APK to VPS
        if: github.event_name == 'push' || inputs.publish_nightly == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT || '22' }}
          key: ${{ secrets.FDROID_DEPLOY_KEY }}
          debug: true
          source: "build/app/outputs/flutter-apk/app-debug.apk"
          target: ${{ env.VPS_DEPLOY_PATH }}
          strip_components: 4
          overwrite: true
      # ─── 9. Echo build result ──────────────────────────────────────────────
      - name: Echo build result
        run: |
          echo "============================================"
          echo "  Deployment Successful"
          echo "  Run #${{ github.run_number }}"
          echo "============================================"
